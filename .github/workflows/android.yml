name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        run: |
          ANDROID_HOME=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.2.12479018" 2>&1 | tail -5
          echo "ndk.dir=$ANDROID_HOME/ndk/27.2.12479018" >> local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.11.1'
          validate-wrappers: false

      - name: Verify submodule and operator lib
        run: |
          echo "=== Operator files ==="
          ls app/src/main/cpp/third_party/MobileFineTuner/operator/ | head -10
          echo "=== JNI source ==="
          head -5 app/src/main/cpp/training_jni.cpp
          echo "=== CMakeLists ==="
          head -20 app/src/main/cpp/CMakeLists.txt

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -400

      - name: Verify native .so
        run: |
          echo "=== Checking .so files ==="
          find app/build -name "libpocket_trainer.so" -exec ls -la {} \; 2>/dev/null || echo "No .so found (build may have skipped native)"
          find app/build -name "operators.a" -exec ls -la {} \; 2>/dev/null || true
          echo "=== APK contents ==="
          find app/build/outputs/apk -name "*.apk" -exec unzip -l {} \; 2>/dev/null | grep "\.so" | head -20 || echo "No APK or no .so in APK"

      - name: Upload APK
        uses: actions/upload-artifact@v5
        if: success()
        with:
          name: pockettrainer-debug
          path: app/build/outputs/apk/

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            app/build/outputs/
            app/build/reports/
